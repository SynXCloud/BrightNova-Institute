<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Academy | Where Toppers Are Made</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Nunito:wght@400;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS variables and global styles */
        :root {
            --bg-dark: #0A0E1A;
            --surface: #111827;
            --card: #1C2537;
            --primary: #F5A623;
            --primary-hover: #e0941d;
            --secondary: #00D4FF;
            --success: #10B981;
            --danger: #EF4444;
            --text-primary: #F1F5F9;
            --text-muted: #94A3B8;
            
            --font-display: 'Syne', sans-serif;
            --font-body: 'Nunito', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* custom cursor */
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-display);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        /* Custom Cursor */
        .cursor-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.2s, height 0.2s;
        }

        .cursor-ring {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(245, 166, 35, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-family: var(--font-body);
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: none;
            z-index: 1;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #000;
            box-shadow: 0 4px 15px rgba(245, 166, 35, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 166, 35, 0.4);
        }

        .btn-outline {
            border: 2px solid var(--secondary);
            color: var(--secondary);
            background: transparent;
        }

        .btn-outline:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Section Setup */
        section {
            padding: 80px 5%;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
            color: var(--text-primary);
        }

        .section-title span {
            color: var(--primary);
        }

        /* Ticker */
        .ticker {
            background: var(--primary);
            color: #000;
            padding: 8px 15px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.9rem;
            position: relative;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticker-content {
            flex-grow: 1;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 20px;
        }

        .ticker-item {
            position: absolute;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .ticker-item.active {
            opacity: 1;
            pointer-events: auto;
        }

        .ticker-close {
            color: rgba(0, 0, 0, 0.6);
            padding: 0 10px;
            transition: color 0.3s;
        }
        
        .ticker-close:hover {
            color: #000;
        }

        /* Navbar */
        .navbar {
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 99;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: padding 0.3s ease;
        }

        .navbar.scrolled {
            padding: 15px 5%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .logo i {
            color: var(--primary);
            font-size: 1.8rem;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links li a {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links li a:hover, .nav-links li a.active {
            color: var(--primary);
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background: var(--primary);
            bottom: -5px;
            left: 0;
            transition: width 0.3s ease;
        }

        .nav-links li a:hover::after, .nav-links li a.active::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-whatsapp {
            background: var(--success);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-whatsapp:hover {
            transform: scale(1.1);
            background: #059669;
        }

        .mobile-toggle {
            display: none;
            font-size: 1.5rem;
            color: var(--text-primary);
        }

        /* Mobile Menu */
        @media (max-width: 992px) {
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 100%;
                height: 100vh;
                background: var(--surface);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                transition: right 0.4s ease-in-out;
                z-index: 98;
                gap: 40px;
            }

            .nav-links.open {
                right: 0;
            }

            .nav-links li {
                opacity: 0;
                transform: translateY(20px);
                transition: opacity 0.4s ease, transform 0.4s ease;
            }

            .nav-links.open li {
                opacity: 1;
                transform: translateY(0);
            }

            .nav-links li a {
                font-size: 1.8rem;
                font-family: var(--font-display);
            }

            .mobile-toggle {
                display: block;
                z-index: 100;
            }
            
            .nav-actions .btn-primary {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-ring" id="cursor-ring"></div>

    <!-- Notice Ticker -->
    <div class="ticker" id="tickerBar">
        <div class="ticker-content" id="tickerContent">
            <!-- Populated by JS -->
        </div>
        <div class="ticker-close" onclick="document.getElementById('tickerBar').style.display='none'">
            <i class="fas fa-times"></i>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
            APEX Academy
        </div>
        
        <ul class="nav-links" id="navLinks">
            <li><a href="#home" class="nav-link active">Home</a></li>
            <li><a href="#courses" class="nav-link">Courses</a></li>
            <li><a href="#results" class="nav-link">Results</a></li>
            <li><a href="#faculty" class="nav-link">Faculty</a></li>
            <li><a href="#resources" class="nav-link">Resources</a></li>
            <li><a href="#admission" class="nav-link">Admission</a></li>
            <li><a href="#contact" class="nav-link">Contact</a></li>
        </ul>

        <div class="nav-actions">
            <a href="#admission" class="btn btn-primary interactive">Free Demo Class</a>
            <a href="https://wa.me/919345678901" class="btn-whatsapp interactive" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <div class="mobile-toggle interactive" id="mobileToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- JavaScript -->
    <script>
        // Custom Cursor
        const cursorDot = document.getElementById('cursor-dot');
        const cursorRing = document.getElementById('cursor-ring');

        document.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;
            
            // Subtle delay for the ring
            setTimeout(() => {
                cursorRing.style.left = `${posX}px`;
                cursorRing.style.top = `${posY}px`;
            }, 50);
        });

        // Add hover effect to interactive elements
        function initInteractiveCursor() {
            const interactiveElements = document.querySelectorAll('a, button, .interactive, input, select, textarea');
            interactiveElements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursorDot.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    cursorRing.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    cursorRing.style.backgroundColor = 'rgba(245, 166, 35, 0.1)';
                });
                el.addEventListener('mouseleave', () => {
                    cursorDot.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursorRing.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursorRing.style.backgroundColor = 'transparent';
                });
            });
        }
        initInteractiveCursor();

        // Notice Ticker
        const tickerMessages = [
            "🔥 JEE Mains 2024 Result: 47 Students in Top 1000!",
            "📢 Admission Open for 2025-26 Batch — Limited Seats!",
            "🏆 NEET 2024: Priya Sharma AIR 34 — APEX Academy",
            "⏰ Free Demo Class: Register by Sunday",
            "🎯 Scholarship Test: 15th December — Apply Now"
        ];
        
        const tickerContent = document.getElementById('tickerContent');
        
        tickerMessages.forEach((msg, idx) => {
            const div = document.createElement('div');
            div.className = `ticker-item ${idx === 0 ? 'active' : ''}`;
            div.innerHTML = msg;
            tickerContent.appendChild(div);
        });

        let currentTicker = 0;
        const tickerItems = document.querySelectorAll('.ticker-item');
        
        setInterval(() => {
            if (tickerItems.length > 0) {
                tickerItems[currentTicker].classList.remove('active');
                currentTicker = (currentTicker + 1) % tickerItems.length;
                tickerItems[currentTicker].classList.add('active');
            }
        }, 4000);

        // Navbar Scroll Effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Mobile Menu Toggle
        const mobileToggle = document.getElementById('mobileToggle');
        const navLinks = document.getElementById('navLinks');
        const navLinksItems = document.querySelectorAll('.nav-links li');
        
        mobileToggle.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            const isOpen = navLinks.classList.contains('open');
            mobileToggle.innerHTML = isOpen ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
            
            if (isOpen) {
                navLinksItems.forEach((item, index) => {
                    item.style.transitionDelay = `${index * 0.1}s`;
                });
            } else {
                navLinksItems.forEach(item => {
                    item.style.transitionDelay = '0s';
                });
            }
        });

        // Close mobile menu on link click
        navLinksItems.forEach(item => {
            item.addEventListener('click', () => {
                navLinks.classList.remove('open');
                mobileToggle.innerHTML = '<i class="fas fa-bars"></i>';
            });
        });

    </script>
</body>
</html>
